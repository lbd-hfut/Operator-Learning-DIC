# Small dataset for quick testing and overfitting validation

speckle:
  speckle_size_range: [1.5, 6.0]
  speckle_density_range: [0.3, 0.6]
  speckle_contrast_range: [0.3, 0.9]

deformation:
  deformation_modes: [tension, compression, shear, rotation, composite]
  displacement_range: [0.1, 20.0]

image:
  image_size: [128, 128]
  noise_std_range: [0.0, 0.03]

sampling:
  n_query_min: 64
  n_query_max: 512
  query_dropout_prob: 0.0
  gradient_weighted_sampling: false

dataset:
  n_samples: 1000
  seed: 42
  mode: on_the_fly
