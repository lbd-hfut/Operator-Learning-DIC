# Large dataset for full training

speckle:
  speckle_size_range: [1.0, 8.0]
  speckle_density_range: [0.2, 0.7]
  speckle_contrast_range: [0.2, 0.95]

deformation:
  deformation_modes: [tension, compression, shear, rotation, composite]
  displacement_range: [0.01, 25.0]

image:
  image_size: [256, 256]
  noise_std_range: [0.0, 0.05]

sampling:
  n_query_min: 128
  n_query_max: 2048
  query_dropout_prob: 0.1
  gradient_weighted_sampling: true

dataset:
  n_samples: 50000
  seed: 42
  mode: hdf5
  cache_path: data/dic_large_train.h5
