# DIC Dataset Generation Configuration
# =====================================

# --- Data source ---
# mode: "real" = load real speckle images, "synthetic" = generate synthetic speckle
mode: real
real_image_dir: dataset/original_image

# --- Output ---
# output_format: "dir" = individual PNG+NPY files, "h5" = single HDF5 file
output_format: dir

# --- Image ---
image_size: [256, 256]

# --- Dataset splits (number of samples per split) ---
splits:
  train: 2340
  validation: 100
  test: 100

# --- Deformation mode proportions ---
# Weights determine the relative probability of each mode being selected.
# The actual count per mode = weight / sum(weights) * n_samples.
# Set weight to 0 to exclude a mode.
#
# multiscale_random: complex sub-pixel field (0.3 ~ 1.0 px, fixed range)
# composite:         large deformation (tension + shear + nonlinear, uses displacement_range)
deformation_modes:
  tension:             0.0
  compression:         0.0
  shear:               0.0
  rotation:            0.0
  composite:           0.3   # 30% large deformation
  multiscale_random:   0.7   # 70% sub-pixel complex fields

# --- Displacement range (pixels) ---
# Used by composite (and tension/compression/shear/rotation if enabled).
# Note: this is the *amplitude* parameter fed to DeformationGenerator;
# actual max pixel displacement of composite at amplitude=10 is ~5-7 px
# due to internal scaling (coefficients sum to ~0.5-0.7).
# multiscale_random is unaffected (fixed 0.3 ~ 1.0).
displacement_range: [0.5, 10.0]

# --- Noise ---
noise_std_range: [0.0, 0.03]

# --- Random seed (for reproducibility) ---
seed: 42
